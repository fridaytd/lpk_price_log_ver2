# sheets_config.example.yaml — Template for multi-sheet configuration
# Copy this file to sheets_config.yaml and fill in your real spreadsheet IDs.
# sheets_config.yaml is gitignored to prevent accidental exposure of spreadsheet IDs.

listing_sheets:
  - name: "GameCategory1.listing"       # Human-readable name; used in log output
    spreadsheet_id: "YOUR_LISTING_SPREADSHEET_ID_HERE"  # Google Sheets spreadsheet ID (found in the sheet URL)

logging_sheets:
  - name: "GameCategory1.log"           # Human-readable name; used in log output and error messages
    spreadsheet_id: "YOUR_LOGGING_SPREADSHEET_ID_1_HERE"  # Google Sheets spreadsheet ID (found in the sheet URL)

  - name: "GameCategory2.log"           # Second target sheet
    spreadsheet_id: "YOUR_LOGGING_SPREADSHEET_ID_2_HERE"  # Replace with actual spreadsheet ID
